user nginx;
worker_processes auto;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  access_log /dev/stdout;
  error_log /dev/stderr warn;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  server_tokens off;
  resolver 127.0.0.11 ipv6=off valid=30s;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 80;
    listen [::]:80;
    server_name _;

    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name rmcryptpad.localhost;

    ssl_certificate /etc/nginx/certs/cryptpad.local.pem;
    ssl_certificate_key /etc/nginx/certs/cryptpad.local-key.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 150m;

    location = /.well-known/openid-configuration {
      set $rmcryptpad_upstream rmcryptpad:8000;
      proxy_pass http://$rmcryptpad_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location ^~ /oidc/ {
      set $rmcryptpad_upstream rmcryptpad:8000;
      proxy_pass http://$rmcryptpad_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location ^~ /api/v1/ {
      set $rmcryptpad_upstream rmcryptpad:8000;
      proxy_pass http://$rmcryptpad_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location ^~ /api/v2/ {
      set $rmcryptpad_upstream rmcryptpad:8000;
      proxy_pass http://$rmcryptpad_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location ^~ /ui/cryptpad/ {
      set $rmcryptpad_upstream rmcryptpad:8000;
      proxy_pass http://$rmcryptpad_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location / {
      return 404;
    }
  }

  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    ssl_certificate /etc/nginx/certs/cryptpad.local.pem;
    ssl_certificate_key /etc/nginx/certs/cryptpad.local-key.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 150m;

    location / {
      set $cryptpad_http_upstream cryptpad:3000;
      proxy_pass http://$cryptpad_http_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;

      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location ^~ /cryptpad_websocket {
      set $cryptpad_ws_upstream cryptpad:3003;
      proxy_pass http://$cryptpad_ws_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;

      proxy_http_version 1.1;
      proxy_read_timeout 3600s;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }
}

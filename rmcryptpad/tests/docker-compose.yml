services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432"
    environment:
      POSTGRES_DB: rmcryptpad
      POSTGRES_USER: rmcryptpad
      POSTGRES_PASSWORD: rmcryptpadtestpwd  # pragma: allowlist secret
    healthcheck:
      test: "pg_isready --dbname=$$POSTGRES_DB --username=$$POSTGRES_USER || exit 1"
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
